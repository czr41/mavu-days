services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mavu
      POSTGRES_PASSWORD: mavu
      POSTGRES_DB: mavu
    ports:
      - "5432:5432"
    volumes:
      - mavu_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mavu -d mavu"]
      interval: 3s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    profiles:
      - worker
    ports:
      - "6379:6379"
    volumes:
      - mavu_redis_data:/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - mavu_minio_data:/data

volumes:
  mavu_pg_data:
  mavu_redis_data:
  mavu_minio_data: